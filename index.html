<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#12200f">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<title>Lineup Board</title>
<style>
  :root{
    --night:#12200f; --panel:#1c2f18; --panel2:#243a1e; --ink:#f2eee0;
    --accent:#f6c445; --danger:#e07856; --chalk:#f6f2e6; --dim:#93a789;
    --sub:#7fc4ea;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--night); color:var(--ink);
    font-family:'Arial Narrow', system-ui, sans-serif;}
  button{font-family:inherit;}
  .wrap{max-width:520px; margin:0 auto; padding:10px 10px 40px;}
  h1{font-size:26px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    margin:4px 2px 2px; color:var(--accent);}
  .sub{font-size:15px; opacity:.75; margin:0 2px 10px; font-weight:500;}
  .topbtns{display:flex; gap:8px; margin-bottom:10px;}
  .topbtns button{flex:1; border:none; border-radius:10px; padding:11px; font-size:15px;
    font-weight:700; letter-spacing:1px; text-transform:uppercase;}
  .btn-gold{background:var(--accent); color:#2c250a;}
  .btn-ghost{background:transparent; color:#a9bd9e; border:1px solid #486340 !important;}
  .btn-red{background:transparent; color:var(--danger); border:1px solid #6b4032 !important;}

  #banner{min-height:34px; margin-bottom:8px; border-radius:10px; padding:6px 12px;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    font-weight:700; font-size:15px; letter-spacing:.5px;
    border:1px dashed #486340; color:var(--dim);}
  #banner.active{background:var(--accent); color:#2c250a; border:none;}
  #banner .btns{display:flex; gap:6px;}
  #banner .btns button{background:#2c250a; color:var(--accent); border:none;
    border-radius:8px; padding:3px 10px; font-weight:700; font-size:13px;}
  #banner .txt{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  /* field */
  .field{position:relative; width:100%; aspect-ratio:100/96; border-radius:12px;
    overflow:hidden; box-shadow:0 4px 14px rgba(0,0,0,.45);}
  .field svg{position:absolute; inset:0; width:100%; height:100%; display:block;}
  .slot{position:absolute; transform:translate(-50%,-50%); z-index:2;
    background:transparent; border:none; padding:4px; display:flex;
    flex-direction:column; align-items:center; gap:2px; cursor:pointer;}
  .slot .tag{font-weight:600; font-size:12px; letter-spacing:1px; color:var(--chalk);
    background:rgba(0,0,0,.28); padding:1px 7px; border-radius:8px;}
  .slot .spot{width:34px; height:34px; border-radius:50%;
    border:2px dashed rgba(246,242,230,.85); background:rgba(0,0,0,.10);}
  .slot .chip{max-width:84px; padding:5px 9px; border-radius:16px; background:var(--chalk);
    color:#22381c; font-weight:700; font-size:14px; letter-spacing:.5px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    box-shadow:0 2px 5px rgba(0,0,0,.4);}
  .slot .subchip{max-width:84px; margin-top:1px; padding:2px 8px; border-radius:12px;
    background:rgba(127,196,234,.9); color:#0f2733; font-weight:700; font-size:11px;
    letter-spacing:.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  body.targeting .slot .spot{border-color:var(--accent); background:rgba(246,196,69,.35);}
  body.targeting .slot .chip{outline:3px solid var(--accent);}
  .slot .chip.sel{background:var(--accent); outline:none !important;}

  /* panel */
  .panel{margin-top:12px; background:var(--panel); border-radius:12px; padding:12px;}
  .panel h2{margin:0 0 8px; font-size:17px; font-weight:700; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--accent);}
  .addrow{display:flex; gap:8px; margin-bottom:10px;}
  .addrow input{flex:1; min-width:0; background:var(--panel2); border:1px solid #3a5530;
    color:var(--ink); border-radius:10px; padding:11px 12px; font-size:17px;
    font-family:inherit; font-weight:500; outline:none;}
  .addrow input::placeholder{color:var(--dim);}
  .addrow button{background:var(--accent); color:#2c250a; border:none; border-radius:10px;
    padding:0 18px; font-size:16px; font-weight:700; letter-spacing:1px; text-transform:uppercase;}
  .addrow button:active{transform:scale(.96);}

  .row{display:flex; align-items:center; gap:6px; background:var(--panel2);
    border-radius:10px; padding:6px 8px; margin-bottom:6px;}
  .row.dragging{background:#33502a; opacity:.85;}
  .row.sel{outline:2px solid var(--accent);}
  .row.now{outline:2px solid var(--accent); background:#33502a;}
  .row .handle{font-size:20px; color:#8ea883; padding:2px 6px; cursor:grab;
    touch-action:none; user-select:none;}
  .row .num{width:22px; text-align:center; font-weight:700; font-size:17px; color:var(--accent);}
  .row .pname{flex:1; min-width:0; font-size:18px; font-weight:600; letter-spacing:.5px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:6px 0; cursor:pointer;}
  .row.sel .pname{color:var(--accent);}
  .row .badge{font-size:13px; font-weight:700; letter-spacing:1px; border-radius:8px;
    padding:3px 8px; background:#38542c; color:var(--chalk);}
  .row .badge.none{background:transparent; color:#7d9472; border:1px dashed #55704a;}
  .row .badge.subrole{background:rgba(127,196,234,.9); color:#0f2733;}
  .row .line{font-size:14px; font-weight:600; color:var(--dim);}
  .row .arrow, .row .del{background:none; border:none; font-size:18px; padding:2px 4px;}
  .row .arrow{color:var(--dim);}
  .row .arrow:disabled{color:#4a6142;}
  .row .del{color:var(--danger);}
  .empty{text-align:center; color:#7d9472; font-size:16px; padding:14px 0; font-weight:500;}
  .fullbtn{margin-top:8px; width:100%; background:transparent; border:1px solid #486340;
    color:#a9bd9e; border-radius:10px; padding:9px; font-size:14px; font-weight:600;
    letter-spacing:1px; text-transform:uppercase;}

  /* game mode */
  .nowcard{background:var(--panel); border-radius:12px; padding:14px; margin-bottom:10px;
    border:2px solid var(--accent);}
  .nowcard .lbl{font-size:13px; font-weight:700; letter-spacing:2px; color:var(--accent);
    text-transform:uppercase;}
  .nowcard .bname{font-size:32px; font-weight:700; letter-spacing:.5px; margin:2px 0;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .nowcard .meta{font-size:15px; color:var(--dim); font-weight:600;}
  .nowcard .ondeck{margin-top:8px; font-size:15px; color:var(--ink); font-weight:600;}
  .nowcard .ondeck b{color:var(--accent); font-weight:700; letter-spacing:1px; font-size:13px;}
  .resgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px;}
  .resgrid button{padding:16px 0; border:none; border-radius:12px; font-size:19px;
    font-weight:700; letter-spacing:1px; background:var(--chalk); color:#22381c;}
  .resgrid button:active{transform:scale(.95);}
  .resgrid .out{background:#5a3a30; color:var(--chalk);}
  .resgrid .hr{background:var(--accent);}

  /* subs rows */
  .subrow{display:flex; align-items:center; gap:8px; background:var(--panel2);
    border-radius:10px; padding:8px; margin-bottom:6px;}
  .subrow .pos{font-size:14px; font-weight:700; letter-spacing:1px; background:#38542c;
    color:var(--chalk); border-radius:8px; padding:3px 8px; min-width:34px; text-align:center;}
  .subrow .names{flex:1; min-width:0; font-size:16px; font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .subrow .names em{font-style:normal; color:var(--sub); font-weight:700;}
  .subrow .swap{background:var(--sub); color:#0f2733; border:none; border-radius:9px;
    padding:8px 12px; font-size:14px; font-weight:700; letter-spacing:1px; text-transform:uppercase;}

  /* sheet */
  #sheet{position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.6);
    display:none; align-items:flex-end;}
  #sheet.open{display:flex;}
  .sheetbox{width:100%; max-width:520px; margin:0 auto; background:var(--panel);
    border-radius:16px 16px 0 0; padding:16px 14px 22px;}
  .sheetbox h3{margin:0 0 4px; font-size:20px; font-weight:700; letter-spacing:1.5px;
    color:var(--accent); text-transform:uppercase;}
  .sheetbox p{margin:0 0 12px; font-size:15px; color:var(--dim); font-weight:500;}
  .sheetbox .opt{width:100%; display:block; margin-bottom:8px; border:none; border-radius:11px;
    padding:14px; font-size:16px; font-weight:700; letter-spacing:.5px; text-align:left;
    background:var(--panel2); color:var(--ink);}
  .sheetbox .opt.gold{background:var(--accent); color:#2c250a;}
  .sheetbox .opt.blue{background:var(--sub); color:#0f2733;}
  .sheetbox .opt.red{background:transparent; border:1px solid #6b4032; color:var(--danger);}
  .sheetbox .opt small{display:block; font-weight:600; opacity:.75; font-size:13px; margin-top:2px;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div id="sheet"><div class="sheetbox" id="sheetbox"></div></div>

<script>
var POSITIONS = [
  {key:'P',  x:50, y:72}, {key:'C',  x:50, y:92},
  {key:'1B', x:79, y:59}, {key:'2B', x:63, y:47},
  {key:'SS', x:37, y:47}, {key:'3B', x:21, y:59},
  {key:'LF', x:13, y:26}, {key:'LC', x:37, y:12},
  {key:'RC', x:63, y:12}, {key:'RF', x:87, y:26},
];
var RESULTS = [
  {key:'b1', label:'1B', hit:true,  ab:true},
  {key:'b2', label:'2B', hit:true,  ab:true},
  {key:'b3', label:'3B', hit:true,  ab:true},
  {key:'hr', label:'HR', hit:true,  ab:true},
  {key:'bb', label:'BB', hit:false, ab:false},
  {key:'out',label:'OUT',hit:false, ab:true},
];

var S = {
  players: [],   // [{id, name, pos, role}]  role: 'main' | 'sub'
  nextId: 1,
  stats: {},
  game: null,
};
var view = 'setup';
var selected = null;
var dragId = null;

/* ---------- persistence ---------- */
function save(){ try{ localStorage.setItem('softball-lineup-v2', JSON.stringify(S)); }catch(e){} }
function load(){
  try{
    var raw = localStorage.getItem('softball-lineup-v2');
    if(raw){ S = JSON.parse(raw); }
    else{
      var old = localStorage.getItem('softball-lineup');
      if(old){ var d = JSON.parse(old); S.players = d.players||[]; S.nextId = d.nextId||1; }
    }
  }catch(e){}
  if(!S.stats) S.stats = {};
  // anyone saved before subs existed is a main
  S.players.forEach(function(p){ if(!p.role) p.role = 'main'; });
  if(S.game) view = 'game';
}

/* ---------- helpers ---------- */
function findById(id){ return S.players.find(function(p){ return p.id===id; }) || null; }
function mainOf(key){ return S.players.find(function(p){ return p.pos===key && p.role==='main'; }) || null; }
function subsOf(key){ return S.players.filter(function(p){ return p.pos===key && p.role==='sub'; }); }
function statFor(id, name){
  if(!S.stats[id]) S.stats[id] = {name:name, g:0, ab:0, h:0, hr:0, bb:0};
  if(name) S.stats[id].name = name;
  return S.stats[id];
}
function fmtAvg(st){
  if(st.ab===0) return '—';
  var a = st.h/st.ab;
  if(a>=1) return '1.000';
  return a.toFixed(3).slice(1);
}
function todayLine(id){
  if(!S.game) return '';
  var h=0, ab=0, hr=0;
  S.game.log.forEach(function(e){
    if(e.id!==id) return;
    var r = RESULTS.find(function(x){ return x.key===e.res; });
    if(r.ab) ab++;
    if(r.hit) h++;
    if(e.res==='hr') hr++;
  });
  if(ab===0 && h===0) return '0-0 today';
  return h+'-'+ab+' today'+(hr?(' · '+hr+' HR'):'');
}
function el(tag, cls, txt){
  var e = document.createElement(tag);
  if(cls) e.className = cls;
  if(txt!==undefined) e.textContent = txt;
  return e;
}

/* ---------- bottom sheet ---------- */
var sheet = document.getElementById('sheet');
var sheetbox = document.getElementById('sheetbox');
sheet.addEventListener('click', function(e){ if(e.target===sheet) closeSheet(); });
function closeSheet(){ sheet.classList.remove('open'); sheetbox.innerHTML=''; }
function openSheet(title, subtitle, options){
  sheetbox.innerHTML = '';
  sheetbox.appendChild(el('h3', null, title));
  if(subtitle) sheetbox.appendChild(el('p', null, subtitle));
  options.forEach(function(o){
    var b = el('button', 'opt'+(o.style?' '+o.style:''));
    b.appendChild(document.createTextNode(o.label));
    if(o.note){ var s = el('small', null, o.note); b.appendChild(s); }
    b.addEventListener('click', function(){ closeSheet(); if(o.fn) o.fn(); });
    sheetbox.appendChild(b);
  });
  var c = el('button','opt','Cancel');
  c.addEventListener('click', closeSheet);
  sheetbox.appendChild(c);
  sheet.classList.add('open');
}

/* ---------- render ---------- */
var app = document.getElementById('app');
function render(){
  document.body.classList.toggle('targeting', view==='setup' && selected!==null);
  if(view==='setup') renderSetup();
  else if(view==='game') renderGame();
  else renderStats();
}

/* ===================== SETUP ===================== */
function renderSetup(){
  app.innerHTML = '';
  app.appendChild(el('h1', null, 'Lineup Board'));
  app.appendChild(el('p','sub','Tap a name then a spot. Tap a filled spot to add a sub or make changes.'));

  var top = el('div','topbtns');
  var startB = el('button','btn-gold','⚾ Lock & Start Game');
  startB.addEventListener('click', startGame);
  var statsB = el('button','btn-ghost','Season Stats');
  statsB.addEventListener('click', function(){ view='stats'; render(); });
  top.appendChild(startB); top.appendChild(statsB);
  app.appendChild(top);

  var banner = el('div'); banner.id='banner';
  var sel = selected!==null ? findById(selected) : null;
  if(sel){
    banner.className='active';
    banner.appendChild(el('span','txt', sel.name+' — tap a position'));
    var btns = el('span','btns');
    if(sel.pos){
      var bench = el('button',null,'Bench');
      bench.addEventListener('click', function(){ sel.pos=null; sel.role='main'; selected=null; render(); save(); });
      btns.appendChild(bench);
    }
    var cancel = el('button',null,'Cancel');
    cancel.addEventListener('click', function(){ selected=null; render(); });
    btns.appendChild(cancel);
    banner.appendChild(btns);
  }else{
    banner.appendChild(el('span','txt','No player selected'));
  }
  app.appendChild(banner);

  var field = el('div','field');
  field.innerHTML = fieldSVG();
  POSITIONS.forEach(function(pos){
    var b = el('button','slot');
    b.style.left = pos.x+'%'; b.style.top = pos.y+'%';
    b.appendChild(el('span','tag',pos.key));
    var m = mainOf(pos.key), subs = subsOf(pos.key);
    if(m){
      b.appendChild(el('span','chip'+(selected===m.id?' sel':''), m.name));
    }else{
      b.appendChild(el('span','spot'));
    }
    subs.forEach(function(s){
      b.appendChild(el('span','subchip', s.name));
    });
    b.addEventListener('click', function(){ tapSlot(pos.key); });
    field.appendChild(b);
  });
  app.appendChild(field);

  var panel = el('div','panel');
  panel.appendChild(el('h2',null,'Roster · Batting Order'));

  var addrow = el('div','addrow');
  var input = el('input'); input.type='text'; input.placeholder='Player name';
  input.autocomplete='off'; input.id='nameInput';
  input.addEventListener('keydown', function(e){ if(e.key==='Enter') addPlayer(); });
  var addB = el('button',null,'Add');
  addB.addEventListener('click', addPlayer);
  addrow.appendChild(input); addrow.appendChild(addB);
  panel.appendChild(addrow);

  if(S.players.length===0){
    panel.appendChild(el('div','empty','No players yet — add your first hitter above.'));
  }
  S.players.forEach(function(p, i){
    var row = el('div','row'+(selected===p.id?' sel':'')+(dragId===p.id?' dragging':''));
    row.dataset.rowid = p.id;

    var handle = el('span','handle','≡');
    handle.addEventListener('pointerdown', function(e){
      handle.setPointerCapture(e.pointerId);
      dragId = p.id; row.classList.add('dragging');
    });
    var pname = el('span','pname', p.name);
    pname.addEventListener('click', function(){
      selected = (selected===p.id) ? null : p.id; render();
    });
    var label = p.pos ? (p.role==='sub' ? p.pos+' SUB' : p.pos) : '—';
    var badge = el('span','badge'+(p.pos?(p.role==='sub'?' subrole':''):' none'), label);
    var up = el('button','arrow','▲'); up.disabled=(i===0);
    up.addEventListener('click', function(){ moveRow(p.id,-1); });
    var down = el('button','arrow','▼'); down.disabled=(i===S.players.length-1);
    down.addEventListener('click', function(){ moveRow(p.id,1); });
    var del = el('button','del','✕');
    del.addEventListener('click', function(){
      S.players = S.players.filter(function(x){ return x.id!==p.id; });
      if(selected===p.id) selected=null;
      render(); save();
    });

    row.appendChild(handle); row.appendChild(el('span','num',''+(i+1)));
    row.appendChild(pname); row.appendChild(badge);
    row.appendChild(up); row.appendChild(down); row.appendChild(del);
    panel.appendChild(row);
  });

  if(S.players.length>0){
    var clr = el('button','fullbtn','Clear all positions');
    clr.addEventListener('click', function(){
      S.players.forEach(function(p){ p.pos=null; p.role='main'; });
      selected=null; render(); save();
    });
    panel.appendChild(clr);
  }
  app.appendChild(panel);
}

/* ---------- slot tapping ---------- */
function tapSlot(key){
  var m = mainOf(key), subs = subsOf(key);

  // A player is picked up — where do they go?
  if(selected!==null){
    var sel = findById(selected);
    if(!sel) { selected=null; return render(); }
    if(!m){ assign(sel, key, 'main'); return; }
    if(m.id===sel.id){ selected=null; return render(); }
    openSheet(key, sel.name + ' → ' + key + ' (currently ' + m.name + ')', [
      {label:'Make Starter', note: m.name+' drops to sub', style:'gold',
        fn:function(){ m.role='sub'; assign(sel, key, 'main'); }},
      {label:'Add as Sub', note:'backs up '+m.name, style:'blue',
        fn:function(){ assign(sel, key, 'sub'); }},
      {label:'Swap with '+m.name, note:'they trade spots',
        fn:function(){ var oldPos=sel.pos, oldRole=sel.role||'main';
          assign(sel, key, 'main'); m.pos=oldPos; m.role=oldPos?oldRole:'main'; render(); save(); }},
    ]);
    return;
  }

  // Nothing picked up — manage who's already here
  if(!m && subs.length===0) return;
  var opts = [];
  if(m){
    opts.push({label:'Move '+m.name, note:'then tap a new spot',
      fn:function(){ selected=m.id; render(); }});
  }
  subs.forEach(function(s){
    opts.push({label:'Start '+s.name, note:'swap in for '+(m?m.name:'nobody'), style:'gold',
      fn:function(){ if(m) m.role='sub'; s.role='main'; render(); save(); }});
  });
  if(m){
    opts.push({label:'Bench '+m.name, style:'red',
      fn:function(){ m.pos=null; m.role='main'; render(); save(); }});
  }
  subs.forEach(function(s){
    opts.push({label:'Bench '+s.name+' (sub)', style:'red',
      fn:function(){ s.pos=null; s.role='main'; render(); save(); }});
  });
  openSheet(key, (m?m.name:'No starter') + (subs.length? ' · '+subs.length+' sub'+(subs.length>1?'s':'') : ''), opts);
}
function assign(p, key, role){
  p.pos = key; p.role = role;
  selected = null;
  render(); save();
}

/* ===================== GAME ===================== */
function renderGame(){
  app.innerHTML = '';
  var g = S.game;
  if(g.order.map(findById).filter(Boolean).length===0){ S.game=null; view='setup'; return render(); }
  if(g.idx >= g.order.length) g.idx = 0;
  var cur = findById(g.order[g.idx]);
  var next = findById(g.order[(g.idx+1)%g.order.length]);

  app.appendChild(el('h1', null, 'Game On'));
  app.appendChild(el('p','sub','Tap the result of each at-bat. Tap a name below to jump the order.'));

  var card = el('div','nowcard');
  card.appendChild(el('div','lbl','Now Batting · #'+(g.idx+1)));
  card.appendChild(el('div','bname', cur ? cur.name : '—'));
  var posTxt = '';
  if(cur && cur.pos) posTxt = cur.pos + (cur.role==='sub'?' (sub)':'') + ' · ';
  card.appendChild(el('div','meta', posTxt + todayLine(cur?cur.id:-1)));
  var od = el('div','ondeck');
  od.innerHTML = '<b>ON DECK</b> ';
  od.appendChild(document.createTextNode(next && (!cur || next.id!==cur.id) ? next.name : '—'));
  card.appendChild(od);
  app.appendChild(card);

  var grid = el('div','resgrid');
  RESULTS.forEach(function(r){
    var b = el('button', r.key==='out'?'out':(r.key==='hr'?'hr':''), r.label);
    b.addEventListener('click', function(){ logResult(r.key); });
    grid.appendChild(b);
  });
  app.appendChild(grid);

  var top = el('div','topbtns');
  var undoB = el('button','btn-ghost','↩ Undo Last');
  undoB.disabled = g.log.length===0;
  if(undoB.disabled) undoB.style.opacity=.4;
  undoB.addEventListener('click', undoLast);
  var endB = el('button','btn-red','End Game');
  endB.addEventListener('click', endGame);
  top.appendChild(undoB); top.appendChild(endB);
  app.appendChild(top);

  // subs available to swap in mid-game
  var withSubs = POSITIONS.filter(function(pos){ return subsOf(pos.key).length>0; });
  if(withSubs.length){
    var sp = el('div','panel');
    sp.appendChild(el('h2',null,'Subs · Tap to Swap'));
    withSubs.forEach(function(pos){
      var m = mainOf(pos.key);
      subsOf(pos.key).forEach(function(s){
        var r = el('div','subrow');
        r.appendChild(el('span','pos',pos.key));
        var names = el('span','names');
        names.appendChild(document.createTextNode((m?m.name:'—')+'  ←  '));
        var em = el('em', null, s.name);
        names.appendChild(em);
        r.appendChild(names);
        var b = el('button','swap','Swap In');
        b.addEventListener('click', function(){
          if(m) m.role='sub';
          s.role='main';
          render(); save();
        });
        r.appendChild(b);
        sp.appendChild(r);
      });
    });
    app.appendChild(sp);
  }

  var panel = el('div','panel');
  panel.appendChild(el('h2',null,'Batting Order'));
  g.order.forEach(function(id, i){
    var p = findById(id);
    if(!p) return;
    var row = el('div','row'+(i===g.idx?' now':''));
    row.appendChild(el('span','num',''+(i+1)));
    var pname = el('span','pname', p.name);
    pname.addEventListener('click', function(){ g.idx=i; render(); save(); });
    row.appendChild(pname);
    row.appendChild(el('span','line', todayLine(id)));
    if(p.pos) row.appendChild(el('span','badge'+(p.role==='sub'?' subrole':''), p.pos+(p.role==='sub'?' SUB':'')));
    panel.appendChild(row);
  });
  app.appendChild(panel);
}

/* ===================== STATS ===================== */
function renderStats(){
  app.innerHTML = '';
  app.appendChild(el('h1', null, 'Season Stats'));
  app.appendChild(el('p','sub','Totals from every game, saved on this phone.'));

  var top = el('div','topbtns');
  var backB = el('button','btn-gold','← Back to Lineup');
  backB.addEventListener('click', function(){ view='setup'; render(); });
  top.appendChild(backB);
  app.appendChild(top);

  var ids = Object.keys(S.stats).filter(function(id){
    var st = S.stats[id];
    return st.g>0 || st.ab>0 || st.bb>0;
  });

  var panel = el('div','panel');
  if(ids.length===0){
    panel.appendChild(el('div','empty','No stats yet — play a game and they\'ll show up here.'));
  }else{
    ids.sort(function(a,b){
      var A=S.stats[a], B=S.stats[b];
      return (B.ab>0?B.h/B.ab:-1) - (A.ab>0?A.h/A.ab:-1);
    });
    var tbl = el('table');
    var hr = el('tr');
    ['Player','G','AB','H','HR','BB','AVG'].forEach(function(h){ hr.appendChild(el('th',null,h)); });
    var thead = el('thead'); thead.appendChild(hr); tbl.appendChild(thead);
    var tbody = el('tbody');
    ids.forEach(function(id){
      var st = S.stats[id];
      var tr = el('tr');
      tr.appendChild(el('td',null,st.name));
      ['g','ab','h','hr','bb'].forEach(function(k){ tr.appendChild(el('td',null,''+st[k])); });
      tr.appendChild(el('td','avg',fmtAvg(st)));
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    panel.appendChild(tbl);

    var reset = el('button','fullbtn','Reset all season stats');
    reset.style.marginTop='12px';
    reset.addEventListener('click', function(){
      if(confirm('Wipe ALL season stats? This can\'t be undone.')){ S.stats = {}; render(); save(); }
    });
    panel.appendChild(reset);
  }
  app.appendChild(panel);
}

/* ---------- actions ---------- */
function addPlayer(){
  var input = document.getElementById('nameInput');
  var n = input.value.trim();
  if(!n) return;
  S.players.push({id:S.nextId++, name:n, pos:null, role:'main'});
  render(); save();
  var ni = document.getElementById('nameInput');
  if(ni) ni.focus();
}
function moveRow(id, dir){
  var i = S.players.findIndex(function(x){ return x.id===id; });
  var j = i+dir;
  if(i<0 || j<0 || j>=S.players.length) return;
  var t = S.players[i]; S.players[i]=S.players[j]; S.players[j]=t;
  render(); save();
}
function startGame(){
  if(S.players.length===0){ alert('Add some players first!'); return; }
  if(!confirm('Lock this batting order and start the game?')) return;
  S.game = { order: S.players.map(function(p){ return p.id; }), idx: 0, log: [] };
  selected = null; view = 'game';
  render(); save();
}
function logResult(res){
  var g = S.game;
  var id = g.order[g.idx];
  var p = findById(id);
  var st = statFor(id, p?p.name:'?');
  var r = RESULTS.find(function(x){ return x.key===res; });
  if(r.ab) st.ab++;
  if(r.hit) st.h++;
  if(res==='hr') st.hr++;
  if(res==='bb') st.bb++;
  g.log.push({id:id, res:res, idx:g.idx});
  g.idx = (g.idx+1) % g.order.length;
  render(); save();
}
function undoLast(){
  var g = S.game;
  var e = g.log.pop();
  if(!e) return;
  var st = S.stats[e.id];
  var r = RESULTS.find(function(x){ return x.key===e.res; });
  if(st){
    if(r.ab) st.ab--;
    if(r.hit) st.h--;
    if(e.res==='hr') st.hr--;
    if(e.res==='bb') st.bb--;
  }
  g.idx = e.idx;
  render(); save();
}
function endGame(){
  if(!confirm('End the game? At-bats are saved to season stats.')) return;
  S.game.order.forEach(function(id){
    var p = findById(id);
    statFor(id, p?p.name:undefined).g++;
  });
  S.game = null; view = 'stats';
  render(); save();
}

/* ---------- drag-to-reorder ---------- */
document.addEventListener('pointermove', function(e){
  if(dragId===null) return;
  var elp = document.elementFromPoint(e.clientX, e.clientY);
  var row = elp && elp.closest ? elp.closest('.row') : null;
  if(!row || !row.dataset.rowid) return;
  var overId = Number(row.dataset.rowid);
  if(overId===dragId) return;
  var from = S.players.findIndex(function(x){ return x.id===dragId; });
  var to = S.players.findIndex(function(x){ return x.id===overId; });
  if(from<0 || to<0) return;
  var m = S.players.splice(from,1)[0];
  S.players.splice(to,0,m);
  render();
});
document.addEventListener('pointerup', function(){
  if(dragId===null) return;
  dragId = null;
  render(); save();
});
